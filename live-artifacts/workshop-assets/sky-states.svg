<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140" width="600" height="140" role="img" aria-label="Window sky state frames">
  <!-- 5 sky states: neutral, morning, clear, storm, dawn -->

  <!-- neutral: deep night / idle -->
  <g id="sky-neutral">
    <rect x="5" y="5" width="110" height="130" fill="#0f172a" rx="2"/>
    <circle cx="80" cy="35" r="12" fill="#fde68a" opacity="0.5"/>
    <circle cx="20" cy="25" r="2" fill="white" opacity="0.6"/>
    <circle cx="45" cy="15" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="90" cy="80" r="1" fill="white" opacity="0.4"/>
  </g>

  <!-- morning: soft orange horizon (planning phase) -->
  <g id="sky-morning">
    <rect x="125" y="5" width="110" height="130" fill="#1e1b4b" rx="2"/>
    <rect x="125" y="90" width="110" height="45" fill="#312e81" rx="2"/>
    <rect x="125" y="105" width="110" height="30" fill="#4c1d95"/>
    <ellipse cx="180" cy="135" rx="60" ry="30" fill="#f59e0b" opacity="0.3"/>
    <ellipse cx="180" cy="140" rx="40" ry="20" fill="#fbbf24" opacity="0.2"/>
  </g>

  <!-- clear: bright daylight (active project) -->
  <g id="sky-clear">
    <rect x="245" y="5" width="110" height="130" fill="#1e3a5f" rx="2"/>
    <circle cx="295" cy="40" r="22" fill="#fbbf24" opacity="0.7"/>
    <circle cx="295" cy="40" r="16" fill="#fde68a" opacity="0.6"/>
    <rect x="245" y="100" width="110" height="35" fill="#1e3a5f"/>
    <ellipse cx="260" cy="100" rx="25" ry="12" fill="#e0f2fe" opacity="0.15"/>
    <ellipse cx="310" cy="95" rx="20" ry="10" fill="#e0f2fe" opacity="0.1"/>
  </g>

  <!-- storm: dark clouds (blocked / at-risk project) -->
  <g id="sky-storm">
    <rect x="365" y="5" width="110" height="130" fill="#111827" rx="2"/>
    <ellipse cx="400" cy="40" rx="45" ry="25" fill="#1f2937" opacity="0.9"/>
    <ellipse cx="440" cy="50" rx="35" ry="20" fill="#374151" opacity="0.8"/>
    <ellipse cx="415" cy="55" rx="50" ry="22" fill="#1f2937"/>
    <!-- Rain lines -->
    <line x1="380" y1="80" x2="373" y2="100" stroke="#93c5fd" stroke-width="1" opacity="0.4"/>
    <line x1="395" y1="85" x2="388" y2="108" stroke="#93c5fd" stroke-width="1" opacity="0.35"/>
    <line x1="412" y1="78" x2="405" y2="103" stroke="#93c5fd" stroke-width="1" opacity="0.4"/>
    <line x1="430" y1="82" x2="424" y2="106" stroke="#93c5fd" stroke-width="1" opacity="0.3"/>
    <line x1="448" y1="79" x2="441" y2="102" stroke="#93c5fd" stroke-width="1" opacity="0.35"/>
  </g>

  <!-- dawn: sunrise / project completing -->
  <g id="sky-dawn">
    <rect x="485" y="5" width="110" height="130" fill="#0c0a1e" rx="2"/>
    <rect x="485" y="80" width="110" height="55" fill="#1e1b4b"/>
    <rect x="485" y="98" width="110" height="37" fill="#312e81"/>
    <rect x="485" y="110" width="110" height="25" fill="#7c3aed" opacity="0.6"/>
    <ellipse cx="540" cy="132" rx="55" ry="28" fill="#f59e0b" opacity="0.4"/>
    <ellipse cx="540" cy="136" rx="38" ry="18" fill="#fbbf24" opacity="0.3"/>
    <ellipse cx="540" cy="140" rx="22" ry="10" fill="#fde68a" opacity="0.4"/>
    <!-- Stars fading -->
    <circle cx="500" cy="20" r="1.5" fill="white" opacity="0.5"/>
    <circle cx="525" cy="30" r="1" fill="white" opacity="0.3"/>
    <circle cx="570" cy="18" r="1.5" fill="white" opacity="0.4"/>
  </g>
</svg>
