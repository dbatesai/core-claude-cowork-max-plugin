<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120" role="img" aria-label="Lamp brightness state frames">
  <!-- 5 lamp brightness frames, left to right: frame 0 (brightest) to frame 4 (dimmest) -->
  <!-- CSS classes: lamp-0 through lamp-4 control visibility via the workshop-states.js logic -->

  <!-- Frame 0: full bright -->
  <g id="lamp-frame-0">
    <ellipse cx="40" cy="60" rx="36" ry="36" fill="#f5c842" opacity="0.25"/>
    <ellipse cx="40" cy="60" rx="20" ry="20" fill="#f5c842" opacity="0.5"/>
    <ellipse cx="40" cy="60" rx="8" ry="8" fill="#fde68a"/>
  </g>
  <!-- Frame 1: bright -->
  <g id="lamp-frame-1">
    <ellipse cx="120" cy="60" rx="28" ry="28" fill="#f5c842" opacity="0.18"/>
    <ellipse cx="120" cy="60" rx="14" ry="14" fill="#f5c842" opacity="0.4"/>
    <ellipse cx="120" cy="60" rx="7" ry="7" fill="#fde68a" opacity="0.9"/>
  </g>
  <!-- Frame 2: medium (default) -->
  <g id="lamp-frame-2">
    <ellipse cx="200" cy="60" rx="20" ry="20" fill="#f5c842" opacity="0.12"/>
    <ellipse cx="200" cy="60" rx="10" ry="10" fill="#f5c842" opacity="0.3"/>
    <ellipse cx="200" cy="60" rx="6" ry="6" fill="#fde68a" opacity="0.7"/>
  </g>
  <!-- Frame 3: dim -->
  <g id="lamp-frame-3">
    <ellipse cx="280" cy="60" rx="12" ry="12" fill="#f5c842" opacity="0.08"/>
    <ellipse cx="280" cy="60" rx="6" ry="6" fill="#f5c842" opacity="0.2"/>
    <ellipse cx="280" cy="60" rx="4" ry="4" fill="#fde68a" opacity="0.4"/>
  </g>
  <!-- Frame 4: very dim / off -->
  <g id="lamp-frame-4">
    <ellipse cx="360" cy="60" rx="6" ry="6" fill="#374151" opacity="0.5"/>
    <ellipse cx="360" cy="60" rx="3" ry="3" fill="#4b5563"/>
  </g>
</svg>
