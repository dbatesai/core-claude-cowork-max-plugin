<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="DM Workshop base scene">
  <!-- Base workshop scene: drafting table, hearth, lamp, window, shelf -->
  <!-- Background -->
  <rect width="800" height="500" fill="#111827"/>
  <!-- Floor -->
  <rect x="0" y="420" width="800" height="80" fill="#1a2030"/>
  <!-- Wall -->
  <rect x="0" y="0" width="800" height="420" fill="#1c2333"/>
  <!-- Window (right side) -->
  <rect x="580" y="60" width="180" height="220" rx="4" fill="#1e3a5f" stroke="#2d4a7f" stroke-width="2"/>
  <line x1="670" y1="60" x2="670" y2="280" stroke="#2d4a7f" stroke-width="2"/>
  <line x1="580" y1="170" x2="760" y2="170" stroke="#2d4a7f" stroke-width="2"/>
  <!-- Hearth (left side) -->
  <rect x="40" y="260" width="160" height="160" rx="4" fill="#1a1a2e" stroke="#374151" stroke-width="2"/>
  <rect x="60" y="300" width="120" height="100" rx="2" fill="#0d1117"/>
  <!-- Mantelpiece -->
  <rect x="20" y="250" width="200" height="16" rx="2" fill="#2d3a52"/>
  <!-- Lamp (center-left) -->
  <line x1="280" y1="0" x2="280" y2="120" stroke="#374151" stroke-width="3"/>
  <polygon points="220,120 340,120 310,180 250,180" fill="#2d3a52" stroke="#374151" stroke-width="1.5"/>
  <!-- Lamp glow area (animated via CSS .lamp-glow) -->
  <ellipse class="lamp-glow" cx="280" cy="200" rx="80" ry="30" fill="#f5c842" opacity="0.12"/>
  <!-- Drafting table -->
  <rect x="220" y="320" width="340" height="20" rx="3" fill="#2d3a52"/>
  <rect x="240" y="340" width="8" height="80" fill="#374151"/>
  <rect x="544" y="340" width="8" height="80" fill="#374151"/>
  <!-- Table surface items (subtle) -->
  <rect x="260" y="305" width="140" height="15" rx="2" fill="#1a2236" opacity="0.7"/>
  <rect x="420" y="308" width="80" height="10" rx="1" fill="#1a2236" opacity="0.5"/>
  <!-- Shelf (right of hearth) -->
  <rect x="220" y="170" width="180" height="10" rx="2" fill="#2d3a52"/>
  <rect x="220" y="230" width="180" height="10" rx="2" fill="#2d3a52"/>
  <!-- Shelf brackets -->
  <line x1="230" y1="170" x2="230" y2="240" stroke="#374151" stroke-width="2"/>
  <line x1="390" y1="170" x2="390" y2="240" stroke="#374151" stroke-width="2"/>
</svg>
